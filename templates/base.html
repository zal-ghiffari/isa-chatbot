<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Survey Kesadaran Digital{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js">
    </script>
    <style>
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .chat-bubble {
            max-width: 88%;
            animation: fadeUp 0.35s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-bubble.bot {
            border-radius: 20px 20px 20px 4px;
        }
        .chat-bubble.user {
            border-radius: 20px 20px 4px 20px;
            align-self: flex-end;
        }
        .typing-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        .scale-btn {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .scale-btn:active {
            transform: scale(0.97);
        }
        .scale-btn.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .progress-ring {
            transition: stroke-dashoffset 0.5s ease;
        }
        .grade-badge {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
        }
        /* Responsive certificate */
        .certificate {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border: 3px double #1e3a5f;
        }
        @media print {
            .no-print { display: none !important; }
            .certificate { border: 2px solid #000; box-shadow: none !important; }
        }
        /* Admin */
        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }
        #geo-map { height: 400px; border-radius: 16px; z-index: 0; }
        @media (min-width: 768px) {
            #geo-map { height: 500px; }
        }
        /* Prevent layout shift on mobile */
        .container-safe {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        /* Scrollbar styling */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 text-gray-900">
    {% block content %}{% endblock %}

    <script>
        // Simple toast helper
        function showToast(msg, type = 'info') {
            const colors = { info: 'bg-blue-500', success: 'bg-green-500', error: 'bg-red-500' };
            const el = document.createElement('div');
            el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 ${colors[type] || colors.info} text-white px-6 py-3 rounded-xl shadow-lg text-sm font-medium animate-bounce`;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>

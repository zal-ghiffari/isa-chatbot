services:
  backend:
    build: packages/backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/data/survey.db
      - CORS_ORIGINS=*
    volumes:
      - survey-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  survey-data:
